{% extends "layouts/base_auth.html" %}

{% block title %}Login — RailOps Nusantara{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-brand">
            <i class="bi bi-train-front-fill"></i>
            <h4>RailOps Nusantara</h4>
            <p class="text-muted mb-0">Sistem Manajemen Operasional Kereta Api</p>
        </div>

        <form method="POST" action="#">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="nama@railops.id" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Masukkan password" required>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember" name="remember">
                    <label class="form-check-label" for="remember">Ingat saya</label>
                </div>
                <a href="#" class="small">Lupa password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-box-arrow-in-right me-1"></i> Masuk
            </button>
        </form>

        <p class="text-center text-muted mt-3 mb-0 small">
            &copy; 2026 RailOps Nusantara
        </p>
    </div>
</div>
{% endblock %}
