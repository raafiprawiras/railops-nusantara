<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RailOps Nusantara{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/railops-theme.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include "layouts/partials/sidebar.html" %}
    <div class="ro-overlay" id="roOverlay"></div>
    <div class="ro-main">
        {% include "layouts/partials/navbar.html" %}
        <div class="ro-content animate-fade">
            {% include "layouts/partials/flash_messages.html" %}
            {% block content %}{% endblock %}
        </div>
        {% include "layouts/partials/footer.html" %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/sidebar.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
