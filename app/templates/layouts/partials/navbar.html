<!-- Top Navbar -->
<header class="top-navbar">
    <button class="navbar-toggle-btn" id="sidebarToggle" aria-label="Toggle sidebar">
        <i class="bi bi-list"></i>
    </button>

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="me-auto">
        <ol class="breadcrumb mb-0">
            {% block breadcrumb %}
            <li class="breadcrumb-item active">Dashboard</li>
            {% endblock %}
        </ol>
    </nav>

    <!-- Date -->
    <div class="navbar-date me-3">
        <i class="bi bi-calendar3"></i>
        <span id="navbarDate">{{ current_date }}</span>
    </div>

    <!-- User Dropdown -->
    {% if current_user.is_authenticated %}
    <div class="dropdown">
        <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button"
                id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-person-circle me-1"></i> {{ current_user.full_name }}
        </button>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
            <li><span class="dropdown-item-text small text-muted">{{ current_user.get_role_display() }}</span></li>
            <li><hr class="dropdown-divider"></li>
            <li>
                <form method="POST" action="{{ url_for('auth.logout') }}" class="px-0 mb-0">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="dropdown-item text-danger">
                        <i class="bi bi-box-arrow-right me-1"></i> Keluar
                    </button>
                </form>
            </li>
        </ul>
    </div>
    {% endif %}
</header>
