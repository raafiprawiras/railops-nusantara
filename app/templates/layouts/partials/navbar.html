<header class="ro-topbar">
    <button class="ro-topbar-toggle" id="roSidebarToggle"><i class="bi bi-list"></i></button>
    <nav class="ro-topbar-breadcrumb">
        {% block breadcrumb %}<span>Dashboard</span>{% endblock %}
    </nav>
    <div class="ro-topbar-right">
        <div class="ro-topbar-date"><i class="bi bi-calendar3 me-1"></i>{{ current_date }}</div>
        {% if current_user.is_authenticated %}
        <div class="dropdown">
            <button class="btn btn-sm ro-btn-secondary dropdown-toggle" data-bs-toggle="dropdown">
                <i class="bi bi-person-circle me-1"></i>{{ current_user.full_name }}
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><span class="dropdown-item-text small text-muted">{{ current_user.get_role_display() }}</span></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="{{ url_for('profile.index') }}"><i class="bi bi-person me-2"></i>Profil</a></li>
                <li>
                    <form method="POST" action="{{ url_for('auth.logout') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button class="dropdown-item text-danger"><i class="bi bi-box-arrow-right me-2"></i>Keluar</button>
                    </form>
                </li>
            </ul>
        </div>
        {% endif %}
    </div>
</header>
